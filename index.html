<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 Smart Study Planner</h1>
      <p>Plan your study schedule and track your progress efficiently.</p>
    </header>

    <section class="task-input">
      <input
        type="text"
        id="taskInput"
        placeholder="Enter subject or study task..."
      />
      <input type="date" id="taskDate" />
      <button id="addTaskBtn">Add Task</button>
    </section>

    <section class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </section>

    <section class="stats">
      <div class="stat-card">
        <h3 id="totalTasks">0</h3>
        <p>Total Tasks</p>
      </div>
      <div class="stat-card">
        <h3 id="completedTasks">0</h3>
        <p>Completed</p>
      </div>
      <div class="stat-card">
        <h3 id="pendingTasks">0</h3>
        <p>Pending</p>
      </div>
    </section>

    <section class="task-list-section">
      <h2>Your Study Tasks</h2>
      <ul id="taskList"></ul>
      <p id="emptyMessage">No tasks added yet. Start planning your studies!</p>
    </section>

    <footer>
      <p>Built by Praval Yadav • Open Source Project</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
